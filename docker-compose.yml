services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smokesignals
      POSTGRES_PASSWORD: smokesignals
      POSTGRES_DB: smokesignals
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smokesignals"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ${BACKEND_IMAGE:-jivandabeast/smokesignals-backend}:${IMAGE_TAG:-latest}
    build: ./backend
    environment:
      SMOKESIGNALS_ENV: ${SMOKESIGNALS_ENV:-development}
      SMOKESIGNALS_SECRET_KEY: ${SMOKESIGNALS_SECRET_KEY:-dev-secret-change-me}
      SMOKESIGNALS_DATABASE_URL: postgresql+asyncpg://smokesignals:smokesignals@db:5432/smokesignals
      SMOKESIGNALS_CORS_ORIGINS: ${SMOKESIGNALS_CORS_ORIGINS:-*}
      SMOKESIGNALS_CLOUDFLARE_ACCESS_ENABLED: ${SMOKESIGNALS_CLOUDFLARE_ACCESS_ENABLED:-false}
      SMOKESIGNALS_CLOUDFLARE_TEAM_DOMAIN: ${SMOKESIGNALS_CLOUDFLARE_TEAM_DOMAIN:-}
      SMOKESIGNALS_CLOUDFLARE_AUDIENCE: ${SMOKESIGNALS_CLOUDFLARE_AUDIENCE:-}
      SMOKESIGNALS_VAPID_PUBLIC_KEY: ${SMOKESIGNALS_VAPID_PUBLIC_KEY:-}
      SMOKESIGNALS_VAPID_PRIVATE_KEY: ${SMOKESIGNALS_VAPID_PRIVATE_KEY:-}
      SMOKESIGNALS_VAPID_CONTACT_EMAIL: ${SMOKESIGNALS_VAPID_CONTACT_EMAIL:-admin@smokesignals.local}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ${SMOKESIGNALS_ENV_MOUNT_BACKEND:-./backend/app}:/app/app
      - uploads:/data/uploads
    ports:
      - "8000:8000"

  frontend:
    image: ${FRONTEND_IMAGE:-jivandabeast/smokesignals-frontend}:${IMAGE_TAG:-latest}
    build: ./frontend
    environment:
      SMOKESIGNALS_ENV: ${SMOKESIGNALS_ENV:-development}
      VITE_API_TARGET: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ${SMOKESIGNALS_ENV_MOUNT_FRONTEND:-./frontend}:/app
      - /app/node_modules
    ports:
      - "5173:5173"

volumes:
  db-data:
  uploads:
