name: Docker Image CI

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  BACKEND_IMAGE: jivandabeast/smokesignals-backend
  FRONTEND_IMAGE: jivandabeast/smokesignals-frontend

jobs:
  # ---------------------------------------------------------------------------
  # Per-arch build jobs.
  #
  # Each matrix entry runs on a runner that natively speaks the target
  # architecture (no QEMU emulation), builds one image for one platform,
  # and pushes it "by digest" to DockerHub. The digest is exported as a
  # per-arch artifact so the ``merge`` job can assemble a multi-arch
  # manifest afterwards.
  # ---------------------------------------------------------------------------
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # backend / amd64
          - name: backend
            context: ./backend
            image_env: BACKEND_IMAGE
            platform: linux/amd64
            runs_on: ubuntu-latest
          # backend / arm64 (native arm64 runner — no QEMU)
          - name: backend
            context: ./backend
            image_env: BACKEND_IMAGE
            platform: linux/arm64
            runs_on: ubuntu-24.04-arm
          # frontend / amd64
          - name: frontend
            context: ./frontend
            image_env: FRONTEND_IMAGE
            platform: linux/amd64
            runs_on: ubuntu-latest
          # frontend / arm64 (native arm64 runner — no QEMU)
          - name: frontend
            context: ./frontend
            image_env: FRONTEND_IMAGE
            platform: linux/arm64
            runs_on: ubuntu-24.04-arm

    runs-on: ${{ matrix.runs_on }}

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        run: echo "name=${!IMAGE_ENV_VAR}" >> "$GITHUB_OUTPUT"
        env:
          IMAGE_ENV_VAR: ${{ matrix.image_env }}

      - name: Sanitize platform for artifact paths
        id: platform
        run: |
          pair="${{ matrix.platform }}"
          echo "pair=${pair//\//-}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          outputs: type=image,name=${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.name }}-${{ steps.platform.outputs.pair }}
          cache-to: type=gha,scope=${{ matrix.name }}-${{ steps.platform.outputs.pair }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests/${{ matrix.name }}
          echo "${{ steps.build.outputs.digest }}" > "/tmp/digests/${{ matrix.name }}/${{ steps.platform.outputs.pair }}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.name }}-${{ steps.platform.outputs.pair }}
          path: /tmp/digests/${{ matrix.name }}/*
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Merge job.
  #
  # Pulls every per-arch digest, then uses ``docker buildx imagetools
  # create`` to stitch them into one multi-arch manifest per image. The
  # final tags (:latest and :<git-sha>) are what end-users pull.
  # ---------------------------------------------------------------------------
  merge:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            image: jivandabeast/smokesignals-backend
          - name: frontend
            image: jivandabeast/smokesignals-frontend

    steps:
      - name: Download digest artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.name }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push manifest
        working-directory: /tmp/digests
        run: |
          # Each file in /tmp/digests is a sha256:... digest for one platform.
          # Combine them into a single multi-arch manifest tagged :latest and :<sha>.
          refs=""
          for f in *; do
            digest="$(cat "$f")"
            refs="$refs ${{ matrix.image }}@${digest}"
          done
          echo "Merging digests:$refs"
          docker buildx imagetools create \
            --tag "${{ matrix.image }}:latest" \
            --tag "${{ matrix.image }}:${{ github.sha }}" \
            $refs

      - name: Inspect published image
        run: docker buildx imagetools inspect "${{ matrix.image }}:latest"
