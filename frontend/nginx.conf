server {
    listen 5173;
    server_name _;

    # Keep uploads reasonable; matches SMOKESIGNALS_MAX_UPLOAD_BYTES default.
    client_max_body_size 10m;

    root /usr/share/nginx/html;
    index index.html;

    # Long-lived cache for hashed asset files produced by Vite.
    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Uploaded avatars (and any other user-supplied media). Forwarded to the
    # backend which serves them via a StaticFiles mount. Kept OUTSIDE the /api
    # location so they aren't gated by any /api-scoped edge auth.
    location /uploads/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # JSON API. Bearer auth is done in FastAPI; we just forward.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Cf-Access-Jwt-Assertion is a header, so it's forwarded automatically.
    }

    # SPA fallback — must be last so /assets/, /uploads/, /api/ win.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
